<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>银龄就医指南 - 白城市医院院内导航</title>
    <!-- 引入全局样式（保持和网站其他页面风格统一） -->
    <link rel="stylesheet" href="../assets/css/style.css">
    <!-- 引入百度地图API（已填你的AK） -->
    <script type="text/javascript" src="https://api.map.baidu.com/api?v=3.0&ak=drIUpLywe6w38TRuUhvDqGodKez1jDXN"></script>
    <!-- 室内地图插件 -->
    <script type="text/javascript" src="https://api.map.baidu.com/library/IndoorMap/2.0/src/IndoorMap_min.js"></script>
    <style>
        /* 院内导航专属样式（补充全局样式未覆盖的部分，适配老年用户） */
        .nav-container {
            width: 95%;
            margin: 0 auto;
            padding: 10px 0;
        }
        .nav-title {
            text-align: center;
            padding: 15px 0;
            font-size: 22px;
            color: #333;
            font-weight: bold;
            margin-bottom: 10px;
        }
        #map-container {
            width: 100%;
            height: 60vh;
            border-radius: 10px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            margin-bottom: 15px;
        }
        .nav-function {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            align-items: center;
            margin-bottom: 15px;
        }
        .nav-function input, .nav-function select {
            flex: 1;
            min-width: 200px;
            padding: 12px 15px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 16px;
        }
        .nav-function button {
            padding: 12px 25px;
            background-color: #2d8cf0;
            color: #fff;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
            font-weight: bold;
        }
        .nav-function button:active {
            background-color: #1c7ed6;
        }
        .nav-tips {
            padding: 15px;
            background-color: #fff;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        .nav-tips h3 {
            font-size: 18px;
            color: #2d8cf0;
            margin-bottom: 10px;
        }
        .nav-tips p {
            font-size: 17px;
            line-height: 1.8;
            color: #333;
        }
        /* 适配移动端，和原有网站响应式兼容 */
        @media (max-width: 768px) {
            .nav-function {
                flex-direction: column;
                align-items: stretch;
            }
            .nav-title {
                font-size: 20px;
            }
            .nav-tips p {
                font-size: 16px;
            }
        }
    </style>
</head>
<body>
    <!-- 复用网站全局布局，仅新增导航内容 -->
    <div class="nav-container">
        <div class="nav-title">白城市医院 - 银龄院内导航</div>
        
        <!-- 地图容器 -->
        <div id="map-container"></div>
        
        <!-- 功能区：起点/终点/楼层切换/导航按钮 -->
        <div class="nav-function">
            <input type="text" id="start-point" placeholder="起点（如：医院正门/当前位置）">
            <input type="text" id="end-point" placeholder="终点（如：内科门诊/检验科）">
            <select id="floor-select">
                <option value="1">门诊楼1楼</option>
                <option value="2">门诊楼2楼</option>
                <option value="3">门诊楼3楼</option>
                <option value="4">门诊楼4楼</option>
                <option value="5">门诊楼5楼</option>
                <option value="6">住院楼1楼</option>
                <option value="7">住院楼2楼</option>
            </select>
            <button id="start-nav">开始导航</button>
            <button id="voice-btn">语音播报</button>
        </div>
        
        <!-- 导航提示区 -->
        <div class="nav-tips">
            <h3>导航指引</h3>
            <p id="tips-content">请输入起点和终点，选择楼层后点击「开始导航」</p>
        </div>
    </div>

    <script>
        // 全局变量（避免和app.js冲突，使用命名空间隔离）
        const hospitalNav = {
            map: null,
            indoorMap: null,
            walkingRoute: null,
            currentTips: "",
            // 白城市医院精准经纬度
            hospitalLng: 122.816547,
            hospitalLat: 45.626789,

            // 初始化入口
            init: function() {
                this.initMap();
                this.bindEvents();
            },

            // 初始化百度地图
            initMap: function() {
                // 创建地图实例
                this.map = new BMapGL.Map("map-container");
                const centerPoint = new BMapGL.Point(this.hospitalLng, this.hospitalLat);
                this.map.centerAndZoom(centerPoint, 19);
                this.map.enableScrollWheelZoom(true);
                this.map.enableDragging(true);

                // 加载室内地图
                this.loadIndoorMap();
                // 获取用户定位
                this.getCurrentLocation();
            },

            // 加载室内地图
            loadIndoorMap: function() {
                const indoorMapId = "1001"; // 测试ID，后续可替换为白城市医院专属ID
                this.indoorMap = new BMapGL.IndoorMap(indoorMapId);
                this.map.addOverlay(this.indoorMap);

                this.indoorMap.addEventListener("indoor_load", () => {
                    console.log("白城市医院室内地图加载完成");
                    this.indoorMap.showFloor(1);
                    document.getElementById("tips-content").innerText = "✅ 白城市医院地图加载完成，可开始导航";
                });
            },

            // 获取用户定位
            getCurrentLocation: function() {
                const geolocation = new BMapGL.Geolocation();
                geolocation.getCurrentPosition(
                    (r) => {
                        if (geolocation.getStatus() === BMAP_STATUS_SUCCESS) {
                            const userPoint = new BMapGL.Point(r.point.lng, r.point.lat);
                            const marker = new BMapGL.Marker(userPoint);
                            this.map.addOverlay(marker);
                            marker.setTitle("您当前的位置");
                            this.map.panTo(userPoint);
                            document.getElementById("start-point").value = "当前位置";
                        } else {
                            document.getElementById("tips-content").innerText = "⚠️ 定位失败，请手动输入起点（如：白城市医院正门）";
                        }
                    },
                    { enableHighAccuracy: true, timeout: 10000, maximumAge: 0 }
                );
            },

            // 切换楼层
            switchFloor: function() {
                const floor = document.getElementById("floor-select").value;
                this.indoorMap.showFloor(parseInt(floor));
                const floorText = document.getElementById("floor-select").options[document.getElementById("floor-select").selectedIndex].text;
                document.getElementById("tips-content").innerText = `已切换到${floorText}`;
            },

            // 开始导航
            startNavigation: function() {
                const start = document.getElementById("start-point").value.trim();
                const end = document.getElementById("end-point").value.trim();
                const floorText = document.getElementById("floor-select").options[document.getElementById("floor-select").selectedIndex].text;

                if (!start || !end) {
                    document.getElementById("tips-content").innerText = "⚠️ 请填写完整的起点和终点（如：正门 → 内科门诊）";
                    return;
                }

                this.walkingRoute = new BMapGL.WalkingRoute(this.map, {
                    renderOptions: {
                        map: this.map,
                        panel: "tips-content",
                        strokeColor: "#2d8cf0",
                        strokeWeight: 8,
                        strokeOpacity: 0.9
                    },
                    onSearchComplete: (result) => {
                        if (this.walkingRoute.getStatus() === BMAP_STATUS_SUCCESS) {
                            const plan = result.getPlan(0);
                            let tips = `📍 ${floorText} 导航路线：\n`;
                            for (let i = 0; i < plan.getNumSteps(); i++) {
                                const step = plan.getStep(i);
                                tips += `${i+1}. ${step.getDescription()}（距离：${step.getDistance()}米）\n`;
                            }
                            this.currentTips = tips.replace(/\n/g, "，");
                            document.getElementById("tips-content").innerText = tips;
                        } else {
                            document.getElementById("tips-content").innerText = "⚠️ 导航路线生成失败，请确认地址在白城市医院内";
                        }
                    }
                });

                this.walkingRoute.search(start + " 白城市医院", end + " 白城市医院");
            },

            // 语音播报
            playVoiceTips: function() {
                if (!this.currentTips) {
                    alert("请先生成导航路线");
                    return;
                }
                const audio = new Audio(`https://tsn.baidu.com/text2audio?tex=${encodeURIComponent(this.currentTips)}&lan=zh&cuid=warm-guide&ctp=1&tok=24.8a7e129007df45099f08c99d32b57841.2592000.1716622745.282335-60000000`);
                audio.play();
            },

            // 绑定事件（避免全局污染）
            bindEvents: function() {
                document.getElementById("start-nav").addEventListener("click", () => this.startNavigation());
                document.getElementById("voice-btn").addEventListener("click", () => this.playVoiceTips());
                document.getElementById("floor-select").addEventListener("change", () => this.switchFloor());
            }
        };

        // 页面加载完成后初始化导航功能（兼容原有app.js的加载顺序）
        window.addEventListener("load", () => {
            hospitalNav.init();
        });
    </script>
</body>
</html>
