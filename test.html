<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>完整测试 - 银龄就医</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { font-family: system-ui; padding: 20px; max-width: 500px; margin: 0 auto; }
        input, button { padding: 12px; margin: 8px 0; width: 100%; font-size: 16px; }
        button { background: #2c7da0; color: white; border: none; border-radius: 30px; cursor: pointer; }
        .error { color: red; }
        .success { color: green; }
    </style>
</head>
<body>
    <h1>🏥 银龄就医·随身指南</h1>
    <div id="status">⏳ 正在连接 Supabase...</div>
    
    <div id="loginBox">
        <h2>登录</h2>
        <input type="email" id="loginEmail" placeholder="邮箱">
        <input type="password" id="loginPassword" placeholder="密码">
        <button onclick="doLogin()">登录</button>
        <button onclick="showRegister()">注册新账号</button>
        <div id="loginMsg"></div>
    </div>
    
    <div id="registerBox" style="display:none;">
        <h2>注册</h2>
        <input type="email" id="regEmail" placeholder="邮箱">
        <input type="password" id="regPassword" placeholder="密码（至少6位）">
        <input type="text" id="regName" placeholder="昵称">
        <button onclick="doRegister()">注册</button>
        <button onclick="showLogin()">返回登录</button>
        <div id="regMsg"></div>
    </div>
    
    <div id="mainBox" style="display:none;">
        <h2>✅ 登录成功！</h2>
        <p id="userInfo"></p>
        <button onclick="doLogout()">退出登录</button>
        <hr>
        <h3>功能列表</h3>
        <ul>
            <li>🔍 不知道挂哪科？</li>
            <li>📋 挂号·签到·取药</li>
            <li>🗺️ 院内实时导航</li>
            <li>🚨 SOS 紧急情况</li>
            <li>📁 我的健康档案</li>
        </ul>
        <p style="color: green;">所有功能都已就绪！</p>
    </div>

    <script>
        const SUPABASE_URL = 'https://ddurkjatbkykogkurcyu.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImRkdXJramF0Ymt5a29na3VyY3l1Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYzMzEwNDksImV4cCI6MjA5MTkwNzA0OX0.pDFHzoRzoTyP3fcQIMwZuVpriSxjMPWNAbhYuImUnDs';
        
        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
        let currentUser = null;

        // 检查连接
        async function checkConnection() {
            try {
                const { data, error } = await supabase.auth.getSession();
                if (error) {
                    document.getElementById('status').innerHTML = '❌ 连接失败: ' + error.message;
                } else {
                    document.getElementById('status').innerHTML = '✅ Supabase 连接成功！';
                    // 检查是否有已登录用户
                    if (data.session) {
                        currentUser = data.session.user;
                        showMain();
                    }
                }
            } catch (e) {
                document.getElementById('status').innerHTML = '❌ 错误: ' + e.message;
            }
        }

        // 登录
        async function doLogin() {
            const email = document.getElementById('loginEmail').value;
            const password = document.getElementById('loginPassword').value;
            const msgDiv = document.getElementById('loginMsg');
            
            if (!email || !password) {
                msgDiv.innerHTML = '<span class="error">请填写邮箱和密码</span>';
                return;
            }
            
            msgDiv.innerHTML = '登录中...';
            
            const { data, error } = await supabase.auth.signInWithPassword({
                email: email,
                password: password
            });
            
            if (error) {
                msgDiv.innerHTML = '<span class="error">❌ ' + error.message + '</span>';
            } else {
                msgDiv.innerHTML = '<span class="success">✅ 登录成功！</span>';
                currentUser = data.user;
                showMain();
            }
        }

        // 注册
        async function doRegister() {
            const email = document.getElementById('regEmail').value;
            const password = document.getElementById('regPassword').value;
            const name = document.getElementById('regName').value;
            const msgDiv = document.getElementById('regMsg');
            
            if (!email || !password) {
                msgDiv.innerHTML = '<span class="error">请填写邮箱和密码</span>';
                return;
            }
            if (password.length < 6) {
                msgDiv.innerHTML = '<span class="error">密码至少6位</span>';
                return;
            }
            
            msgDiv.innerHTML = '注册中...';
            
            const { data, error } = await supabase.auth.signUp({
                email: email,
                password: password,
                options: {
                    data: { name: name || email.split('@')[0] }
                }
            });
            
            if (error) {
                msgDiv.innerHTML = '<span class="error">❌ ' + error.message + '</span>';
            } else {
                msgDiv.innerHTML = '<span class="success">✅ 注册成功！正在自动登录...</span>';
                // 自动登录
                setTimeout(() => {
                    doLoginAfterRegister(email, password);
                }, 1000);
            }
        }

        async function doLoginAfterRegister(email, password) {
            const { data, error } = await supabase.auth.signInWithPassword({
                email: email,
                password: password
            });
            if (!error && data.user) {
                currentUser = data.user;
                showMain();
            }
        }

        // 退出登录
        async function doLogout() {
            await supabase.auth.signOut();
            currentUser = null;
            showLogin();
        }

        // 显示主界面
        function showMain() {
            document.getElementById('loginBox').style.display = 'none';
            document.getElementById('registerBox').style.display = 'none';
            document.getElementById('mainBox').style.display = 'block';
            document.getElementById('userInfo').innerHTML = `欢迎，${currentUser.user_metadata?.name || currentUser.email}！`;
        }

        function showLogin() {
            document.getElementById('loginBox').style.display = 'block';
            document.getElementById('registerBox').style.display = 'none';
            document.getElementById('mainBox').style.display = 'none';
            document.getElementById('loginEmail').value = '';
            document.getElementById('loginPassword').value = '';
            document.getElementById('loginMsg').innerHTML = '';
        }

        function showRegister() {
            document.getElementById('loginBox').style.display = 'none';
            document.getElementById('registerBox').style.display = 'block';
            document.getElementById('mainBox').style.display = 'none';
            document.getElementById('regEmail').value = '';
            document.getElementById('regPassword').value = '';
            document.getElementById('regName').value = '';
            document.getElementById('regMsg').innerHTML = '';
        }

        checkConnection();
    </script>
</body>
</html>
